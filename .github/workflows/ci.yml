name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test and migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      MIG_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_mig_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest suite
        run: pytest -q

      - name: Create migration scratch database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_ci_migrations
        run: |
          python - <<'PY'
          import os
          import psycopg2

          database_url = os.environ["DATABASE_URL"]
          database_name = database_url.rsplit("/", 1)[1]
          maintenance_url = database_url.rsplit("/", 1)[0] + "/postgres"

          conn = psycopg2.connect(maintenance_url)
          conn.autocommit = True
          try:
              with conn.cursor() as cursor:
                  cursor.execute(
                      "SELECT pg_terminate_backend(pid) "
                      "FROM pg_stat_activity "
                      "WHERE datname = %s AND pid <> pg_backend_pid()",
                      (database_name,),
                  )
                  cursor.execute(f'DROP DATABASE IF EXISTS "{database_name}"')
                  cursor.execute(f'CREATE DATABASE "{database_name}"')
          finally:
              conn.close()
          PY

      - name: Check migration upgrade and downgrade
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_ci_migrations
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Drop migration scratch database
        if: always()
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_ci_migrations
        run: |
          python - <<'PY'
          import os
          import psycopg2

          database_url = os.environ["DATABASE_URL"]
          database_name = database_url.rsplit("/", 1)[1]
          maintenance_url = database_url.rsplit("/", 1)[0] + "/postgres"

          conn = psycopg2.connect(maintenance_url)
          conn.autocommit = True
          try:
              with conn.cursor() as cursor:
                  cursor.execute(
                      "SELECT pg_terminate_backend(pid) "
                      "FROM pg_stat_activity "
                      "WHERE datname = %s AND pid <> pg_backend_pid()",
                      (database_name,),
                  )
                  cursor.execute(f'DROP DATABASE IF EXISTS "{database_name}"')
          finally:
              conn.close()
          PY
