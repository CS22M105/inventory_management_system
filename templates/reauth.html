{% extends "base.html" %}

{% block title %}Confirm Password | Nursing Inventory System{% endblock %}

{% block content %}
<section>
    <h2>Confirm Your Password</h2>
    <p>For security, please re-enter your password to continue with this action.</p>

    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('reauth') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next }}">
        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            autofocus
        >

        <button type="submit">Confirm</button>
    </form>
</section>
{% endblock %}
