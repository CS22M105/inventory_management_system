{% extends "base.html" %}

{% block title %}Confirm Password | Nursing Inventory System{% endblock %}

{% block content %}
<section>
    <h2>Confirm Your Password</h2>
    <p>For security, please re-enter your password to continue with this action.</p>

    {% if error %}
    <p class="error-message" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('auth.reauth') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next }}">
        <label for="password">Password</label>
        <div class="password-input-group">
            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
                autofocus
            >
            <button class="password-toggle" type="button" data-password-toggle="password" aria-label="Show password" title="Show password">
                <span class="password-eye" aria-hidden="true"></span>
            </button>
        </div>

        <button type="submit">Confirm</button>
    </form>
</section>
{% endblock %}
