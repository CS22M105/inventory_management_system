{% extends "base.html" %}

{% block title %}Edit Item | Nursing Inventory System{% endblock %}

{% block content %}
<section>
    <div class="page-header">
        <div>
            <h2>Edit Item</h2>
            <p>Update item details, stock thresholds, and location information.</p>
        </div>

        <a class="button-link" href="{{ url_for('items') }}">All Items</a>
    </div>

    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('item_edit', item_id=item['id']) }}">
        <label for="barcode">Barcode</label>
        <input
            type="text"
            id="barcode"
            name="barcode"
            value="{{ item.get('barcode', '') }}"
            required
        >

        <label for="name">Item Name</label>
        <input
            type="text"
            id="name"
            name="name"
            value="{{ item.get('name', '') }}"
            required
        >

        <label for="room">Room</label>
        <input
            type="text"
            id="room"
            name="room"
            value="{{ item.get('room', '') }}"
            required
        >

        <label for="bin_location">Bin Location</label>
        <input
            type="text"
            id="bin_location"
            name="bin_location"
            value="{{ item.get('bin_location', '') }}"
            required
        >

        <label for="company">Vendor</label>
        <input
            type="text"
            id="company"
            name="company"
            value="{{ item.get('company') or '' }}"
        >

        <label for="quantity">Current Quantity</label>
        <input
            type="number"
            id="quantity"
            name="quantity"
            min="0"
            value="{{ item.get('quantity', 0) }}"
            required
        >

        <label for="minimum_quantity">Minimum Quantity</label>
        <input
            type="number"
            id="minimum_quantity"
            name="minimum_quantity"
            min="0"
            value="{{ item.get('minimum_quantity', 0) }}"
            required
        >

        <label for="location">General Location</label>
        <input
            type="text"
            id="location"
            name="location"
            value="{{ item.get('location') or '' }}"
        >

        <label for="expiration_date">Expiration Date</label>
        <input
            type="text"
            id="expiration_date"
            name="expiration_date"
            placeholder="00/00/0000"
            value="{{ item.get('expiration_date') or '00/00/0000' }}"
        >

        <label for="notes">Notes</label>
        <textarea
            id="notes"
            name="notes"
            rows="4"
        >{{ item.get('notes') or '' }}</textarea>

        <button type="submit">Save Item</button>
    </form>
</section>
{% endblock %}
