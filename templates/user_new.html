{% extends "base.html" %}

{% block title %}Add User | Nursing Inventory System{% endblock %}

{% block content %}
<section>
    <h2>Add User</h2>
    <p>Create a user and email them a link to set their own password.</p>

    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('admin_user_new') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="name">Full Name</label>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Example: Jane Doe"
            required
        >

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Example: jane.doe@example.edu"
            required
        >

        <label for="institution_id">Institution ID (optional)</label>
        <input
            type="text"
            id="institution_id"
            name="institution_id"
            placeholder="Example: S2001"
        >

        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="">Select a role</option>
            {% for role_value, role_label in role_options %}
            <option value="{{ role_value }}">{{ role_label }}</option>
            {% endfor %}
        </select>

        <label for="department">Department</label>
        <input
            type="text"
            id="department"
            name="department"
            placeholder="Example: Nursing"
        >

        <button type="submit">Create User &amp; Send Invite</button>
    </form>
</section>
{% endblock %}
